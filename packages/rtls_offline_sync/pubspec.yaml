name: rtls_offline_sync
description: Offline-first location sync with batch upload and bidirectional pull/merge.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  rtls_core:
    path: ../rtls_core

flutter:
  plugin:
    platforms:
      android:
        package: com.rtls.offline_sync
        pluginClass: RtlsOfflineSyncPlugin
