name: rtls_location
description: Background location collection with GPS filtering and recording policies.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  rtls_core:
    path: ../rtls_core

flutter:
  plugin:
    platforms:
      android:
        package: com.rtls.location_flutter
        pluginClass: RtlsLocationPlugin
