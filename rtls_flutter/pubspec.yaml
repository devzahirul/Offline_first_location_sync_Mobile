name: rtls_flutter
description: Flutter plugin for offline-first location sync (Android via KMP, iOS via RTLSyncKit).
version: 0.1.0
homepage: https://github.com/devzahirul/Offline_first_location_sync_iOS
repository: https://github.com/devzahirul/Offline_first_location_sync_iOS

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.rtls.rtls_flutter
        pluginClass: RtlsFlutterPlugin
      ios:
        pluginClass: RtlsFlutterPlugin
